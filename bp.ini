#开头：
Lumi，一个真正“在场”的AI学习搭子！
一个占据孩子每年500小时的桌面入口！
小字：能看见、能听见，并持续理解孩子学习过程的桌面智能终端。

#Problem：
每天都在发生，但没人解决的问题
不会教---讲不明白，一讲就乱
不会陪---缺乏耐心，越陪越崩
不会管---“拖延、粗心、走神、近视”，习惯失控
作业辅导已经成为亲子矛盾爆发的高危时刻。

#商业画布：重新定义“学习”这件事的坐标系

（4象限图）
价值：增负（更高时间投入）=> 减负（更低完成成本）
形式：工具（结果优先）=> 陪伴（过程优先）

增负+工具：各类学习机/自学类产品（洋葱数学/天天练等）
增负+陪伴：各类线上线下培训机构
减负+工具：拍搜类产品/豆包夸克
减负+陪伴：Lumi

减负市场未来三年一定会“爆发”！

#Solution / Lumi是什么？
Lumi不是一个工具，而是一个持续在场的AI终端
看见：持续感知孩子在做什么
理解：理解孩子的学习过程、状态和能力
介入：只在需要的时候出现，提供引导和帮助（非必要，不打扰）
记忆：持续记忆沉淀与整理以形成深度认知
规划：为家长和孩子持续提供策略规划

#Why Hardware
因为90%的学习行为发生在桌面，而不是屏幕！
没有桌面数据，就没有理解力。

