#Why Now？
AI第一次可以“理解并实时生成过程”

模型在过去3个月发生的关键跃迁：
多模态理解能力成熟（能听能看）
reasoning能力大幅提升（能理解过程）
**实时结构化生成能力的突破**（能实现realtime dsl output）

从chat-tutor(个性化) => video-tutor（可视化） => dsl-tutor(动态化-可交互、可扩展、可动态注入)
我们本质上是在做一个实时结构化生成系统（Agents + DSL + Memory），这个能力在过去3个月才刚刚成立。

#Moat：桌面数据，会持续转化为优势
我们掌握的是最稀缺、不可替代的“学习过程数据”
两个结果：
用户侧：极强黏性
    越来越懂孩子=>替代成本极高
模型侧：持续进化
    在学习场景中的识别与理解能力持续变强。

展示飞轮：更多用户->更多数据->更懂用户/更强模型->更好体验->更多用户

